services:
  - type: web
    name: pharma-backend
    runtime: python
    rootDir: om-main/om-main/backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash render-start.sh
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SYSTEM_MANAGER_ID
        value: sysmanager
      - key: SYSTEM_MANAGER_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_CHAT_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_VISION_MODEL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: "+14155552671"
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
